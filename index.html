<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>aushalten.</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <span class="wordmark">aushalten.</span>
    <button class="theme-btn" id="theme-btn" onclick="openColorSheet()"></button>
  </header>

  <main id="main">
    <div class="task-area" id="task-area"></div>
  </main>

  <div class="day-strip-wrap">
    <div class="day-strip" id="day-strip"></div>
  </div>
</div>

<div class="overlay-bg" id="overlay-bg" onclick="closeColorSheet()"></div>
<div class="color-sheet" id="color-sheet">
  <div class="sheet-label">Farbe</div>
  <div class="swatches" id="swatches"></div>
</div>

<script src="app.js"></script>
</body>
</html>
